<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>病例書寫模板輔助系統</title>
  <meta name="description" content="醫療模板管理工具 — 快速複製病例書寫範本">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="glass-bg"></div>

<div class="app">
  <!-- ======== Header ======== -->
  <header class="app-header">
    <h1>病例書寫模板</h1>
    <span class="header-meta">
      <span id="templateCount">0 筆模板</span>
      <span id="lastSync">尚未同步</span>
    </span>
    <div class="header-actions">
      <label class="theme-switch" for="checkbox" title="切換深色模式">
        <input type="checkbox" id="checkbox">
        <div class="slider round"></div>
      </label>
    </div>
  </header>

  <!-- ======== Toolbar ======== -->
  <div class="toolbar">
    <div class="search-wrapper" id="searchWrapper">
      <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
      <input type="text" placeholder="搜尋模板..." id="searchTemplate" autocomplete="off">
      <span class="kbd-hint">/</span>
      <button class="search-clear" id="searchClear" type="button" aria-label="清除搜尋"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <select id="sortTemplate" class="sort-select">
      <option value="updatedDesc">最新更新</option>
      <option value="createdDesc">最新新增</option>
      <option value="titleAsc">標題 A-Z</option>
    </select>
  </div>

  <!-- ======== Tabs Bar ======== -->
  <div class="tabs-bar">
    <div class="tabs-scroll" id="dynamicTabs"></div>
    <div class="tabs-actions">
      <button class="btn-icon primary" id="addCategoryBtn" title="新增分類" aria-label="新增分類"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
      <button class="btn-icon" id="manageCategoryBtn" title="管理分類" aria-label="管理分類"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
  </div>

  <!-- ======== Workspace ======== -->
  <div class="workspace">
    <!-- List Pane -->
    <div class="list-pane">
      <div class="list-header">
        <h2 id="currentCategoryTitle">分類名稱</h2>
        <div class="list-header-actions">
          <button class="btn-sm btn-primary" id="addTemplateBtn" aria-label="新增模板" style="display:inline-flex;align-items:center;gap:4px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>新增</button>
          <button class="btn-sm btn-ghost" id="syncAllBtn" aria-label="同步至 GitHub">同步</button>
        </div>
      </div>
      <div class="template-list" id="dynamicTemplateList"></div>
    </div>

    <!-- Detail Pane (Desktop) -->
    <div class="detail-pane" id="detailPane">
      <div class="detail-empty" id="detailEmpty">
        <span>← 點選模板以預覽內容</span>
      </div>
      <div id="detailContent" style="display:none; flex-direction:column; flex:1;">
        <h3 class="detail-title" id="detailTitle"></h3>
        <div class="detail-meta-row" id="detailMeta"></div>
        <div class="detail-body" id="detailBody"></div>
        <div class="detail-actions-bar">
          <button class="btn-sm btn-primary" id="detailCopyBtn" aria-label="複製內容">複製內容</button>
          <button class="btn-sm btn-ghost" id="detailEditBtn" aria-label="編輯該模板">編輯</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Detail Overlay -->
  <div class="detail-pane-mobile" id="mobileDetail">
    <button class="detail-back" id="mobileDetailBack">← 返回列表</button>
    <h3 class="detail-title" id="mobileDetailTitle" style="margin-bottom:4px;font-size:1rem;font-weight:500;"></h3>
    <div class="detail-meta-row" id="mobileDetailMeta"></div>
    <div class="detail-body" id="mobileDetailBody" style="flex:1;overflow-y:auto;margin-top:10px;"></div>
    <div style="padding:12px 0; display:flex; gap:8px;">
      <button class="btn-sm btn-primary" id="mobileDetailCopy" style="flex:1;" aria-label="複製內容">複製內容</button>
      <button class="btn-sm btn-ghost" id="mobileDetailEdit" aria-label="編輯該模板">編輯</button>
    </div>
  </div>

  <footer class="app-footer">© 2025 病例書寫模板輔助系統</footer>
</div>

<!-- ======== Slide-over Panel (Add/Edit) ======== -->
<div class="slideover-backdrop" id="slideoverBackdrop">
  <div class="slideover" id="slideover">
    <div class="slideover-header">
      <h2 id="slideoverTitle">新增模板</h2>
      <button class="slideover-close" id="slideoverClose" type="button" aria-label="關閉"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="slideover-body">
      <div>
        <label class="field-label" for="templateCategory">所屬分類</label>
        <select id="templateCategory" class="field-select"></select>
      </div>
      <div>
        <label class="field-label" for="templateTitle">模板標題</label>
        <input type="text" id="templateTitle" class="field-input" placeholder="輸入模板標題">
      </div>
      <div style="flex:1;display:flex;flex-direction:column;">
        <label class="field-label" for="templateContent">模板內容</label>
        <textarea id="templateContent" class="field-textarea" placeholder="輸入模板內容..."></textarea>
      </div>
    </div>
    <div class="slideover-footer">
      <button class="btn-sm btn-primary" id="saveTemplateBtn">儲存</button>
    </div>
  </div>
</div>

<!-- ======== Add Category Modal ======== -->
<div id="categoryModal" class="modal">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0;">新增分類</h2>
      <button class="modal-close-btn" data-close="categoryModal" type="button" aria-label="關閉"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div>
      <label class="field-label" for="categoryName">分類名稱</label>
      <input type="text" id="categoryName" class="field-input" placeholder="輸入分類名稱">
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" data-close="categoryModal">取消</button>
      <button class="modal-btn confirm" id="saveCategoryBtn">新增</button>
    </div>
  </div>
</div>

<!-- ======== Manage Categories Modal ======== -->
<div id="manageCategoryModal" class="modal">
  <div class="modal-content" style="max-width:480px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin:0;">管理分類</h2>
      <button class="modal-close-btn" data-close="manageCategoryModal" type="button" aria-label="關閉"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div id="manageCategoryList" style="display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto;"></div>
  </div>
</div>

<!-- ======== Confirm Modal ======== -->
<div id="confirmModal" class="modal">
  <div class="modal-content" style="max-width:380px;">
    <h2>確認操作</h2>
    <p style="color:var(--text-muted);font-size:0.8125rem;margin-bottom:4px;">您確定要刪除此項目嗎？此操作無法復原。</p>
    <div class="modal-buttons">
      <button class="modal-btn" id="confirmCancelBtn">取消</button>
      <button class="modal-btn confirm" id="confirmOkBtn">確定刪除</button>
    </div>
  </div>
</div>

<!-- ======== Toast Container ======== -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== CONFIG =====
const defaultParts = ['ghp_', 'dU3V6G8uyko', 'J73JpXf9v8bdYkRRncl4aVYlU'];
const defaultToken = defaultParts.join('');
let config = { githubToken: defaultToken, githubUsername: "foured8601", githubRepo: "medical-records", githubBranch: 'main' };

// ===== STATE =====
let appData = { categories: [], templates: [] };
let currentCategoryId = null;
let selectedTemplateId = null;
let lastSyncTime = null;
const dbFilePath = "templates/db.json";
const generateId = () => Math.random().toString(36).substr(2, 9);

// ===== ICONS =====
const icons = {
  copy: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`,
  edit: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14.06 9.02l.92.92L5.92 19H5v-.92l9.06-9.06M17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83a.996.996 0 000-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 17.25V21h3.75L17.81 9.94l-3.75-3.75z"/></svg>`,
  delete: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/></svg>`,
  emptyDoc: `<svg viewBox="0 0 24 24" fill="currentColor" opacity="0.35"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>`
};

// ===== HELPERS =====
function timeAgo(ts) {
  if (!ts) return '—';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return '剛剛';
  if (s < 3600) return Math.floor(s / 60) + ' 分鐘前';
  if (s < 86400) return Math.floor(s / 3600) + ' 小時前';
  if (s < 2592000) return Math.floor(s / 86400) + ' 天前';
  return new Date(ts).toLocaleDateString('zh-TW');
}

function wordCount(text) { return text ? text.replace(/\s/g, '').length : 0; }
function truncate(text, n) { return text && text.length > n ? text.substr(0, n) + '…' : text || ''; }

// ===== TOAST =====
function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  loadSettings();

  const savedSort = localStorage.getItem('sortMethod');
  if (savedSort) document.getElementById('sortTemplate').value = savedSort;

  // Theme
  const ts = document.querySelector('#checkbox');
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    ts.checked = true;
  }
  ts.addEventListener('change', switchTheme);

  // Load
  if (isConfigValid()) {
    try { await loadAllTemplates(); }
    catch (e) { console.error(e); showToast('GitHub 連線失敗', 'error'); renderUI(); }
  } else { renderUI(); }

  setupListeners();
});

// ===== LISTENERS =====
function setupListeners() {
  const searchInput = document.getElementById('searchTemplate');
  const searchWrapper = document.getElementById('searchWrapper');
  const clearBtn = document.getElementById('searchClear');

  // Search with clear
  searchInput.addEventListener('input', function() {
    searchWrapper.classList.toggle('has-value', this.value.length > 0);
    filterTemplates(this.value.toLowerCase());
  });
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchWrapper.classList.remove('has-value');
    filterTemplates('');
    searchInput.focus();
  });

  // Sort
  document.getElementById('sortTemplate').addEventListener('change', function() {
    localStorage.setItem('sortMethod', this.value);
    renderUI();
    if (searchInput.value) filterTemplates(searchInput.value.toLowerCase());
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // '/' to focus search (when not in input)
    if (e.key === '/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
      e.preventDefault();
      searchInput.focus();
    }
    // Esc to close panels
    if (e.key === 'Escape') {
      closeSlideover();
      closeAllModals();
      const md = document.getElementById('mobileDetail');
      if (md && md.classList.contains('open')) md.classList.remove('open');
    }
  });

  // Modal close buttons
  document.querySelectorAll('.modal-close-btn[data-close]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(btn.dataset.close).style.display = 'none';
    });
  });
  document.querySelectorAll('.modal-btn[data-close]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(btn.dataset.close).style.display = 'none';
    });
  });
  window.addEventListener('click', (e) => {
    if (e.target.classList.contains('modal')) e.target.style.display = 'none';
  });

  // Confirm dialog
  document.getElementById('confirmCancelBtn').onclick = hideConfirmationDialog;

  // Add template
  document.getElementById('addTemplateBtn').addEventListener('click', () => {
    if (!appData.categories.length) { showToast('請先新增分類', 'error'); return; }
    openSlideover('add');
  });

  // Sync
  document.getElementById('syncAllBtn').addEventListener('click', () => saveAllTemplates('手動同步'));

  // Add Category
  document.getElementById('addCategoryBtn').addEventListener('click', () => {
    document.getElementById('categoryName').value = '';
    document.getElementById('saveCategoryBtn').onclick = async () => {
      const name = document.getElementById('categoryName').value.trim();
      if (!name) return;
      appData.categories.push({ id: 'cat_' + generateId(), name });
      currentCategoryId = appData.categories[appData.categories.length - 1].id;
      document.getElementById('categoryModal').style.display = 'none';
      renderUI();
      await saveAllTemplates('新增分類: ' + name);
    };
    document.getElementById('categoryModal').style.display = 'flex';
  });

  // Manage Categories
  document.getElementById('manageCategoryBtn').addEventListener('click', () => {
    refreshManageCategoryList();
    document.getElementById('manageCategoryModal').style.display = 'flex';
  });

  // Slideover backdrop click
  document.getElementById('slideoverBackdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeSlideover();
  });
  document.getElementById('slideoverClose').addEventListener('click', closeSlideover);

  // Detail pane buttons (desktop)
  document.getElementById('detailCopyBtn').addEventListener('click', () => {
    const t = appData.templates.find(x => x.id === selectedTemplateId);
    if (t) copyToClipboard(t.content, t.title);
  });
  document.getElementById('detailEditBtn').addEventListener('click', () => {
    if (selectedTemplateId) openSlideover('edit', selectedTemplateId);
  });

  // Mobile detail
  document.getElementById('mobileDetailBack').addEventListener('click', () => {
    document.getElementById('mobileDetail').classList.remove('open');
    document.body.classList.remove('no-scroll');
  });
  document.getElementById('mobileDetailCopy').addEventListener('click', () => {
    const t = appData.templates.find(x => x.id === selectedTemplateId);
    if (t) copyToClipboard(t.content, t.title);
  });
  document.getElementById('mobileDetailEdit').addEventListener('click', () => {
    document.getElementById('mobileDetail').classList.remove('open');
    document.body.classList.remove('no-scroll');
    if (selectedTemplateId) openSlideover('edit', selectedTemplateId);
  });
}

// ===== CATEGORY MANAGEMENT =====
function refreshManageCategoryList() {
  const list = document.getElementById('manageCategoryList');
  list.innerHTML = '';
  if (!appData.categories.length) {
    list.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px;">尚無分類</div>';
    return;
  }
  appData.categories.forEach((cat, index) => {
    const row = document.createElement('div');
    row.className = 'cat-row';

    const input = document.createElement('input');
    input.type = 'text'; input.value = cat.name;

    const upBtn = document.createElement('button');
    upBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>`; upBtn.className = 'cat-manage-btn move';
    if (index === 0) upBtn.style.opacity = '0.3';
    upBtn.onclick = async () => {
      if (index > 0) {
        const temp = appData.categories[index - 1];
        appData.categories[index - 1] = appData.categories[index];
        appData.categories[index] = temp;
        refreshManageCategoryList();
        renderUI();
        await saveAllTemplates('調整分類順序');
      }
    };

    const downBtn = document.createElement('button');
    downBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>`; downBtn.className = 'cat-manage-btn move';
    if (index === appData.categories.length - 1) downBtn.style.opacity = '0.3';
    downBtn.onclick = async () => {
      if (index < appData.categories.length - 1) {
        const temp = appData.categories[index + 1];
        appData.categories[index + 1] = appData.categories[index];
        appData.categories[index] = temp;
        refreshManageCategoryList();
        renderUI();
        await saveAllTemplates('調整分類順序');
      }
    };

    const saveBtn = document.createElement('button');
    saveBtn.textContent = '儲存'; saveBtn.className = 'cat-manage-btn save';
    saveBtn.onclick = async () => {
      const n = input.value.trim();
      if (n && n !== cat.name) { cat.name = n; renderUI(); await saveAllTemplates('重新命名: ' + n); showToast('已更新'); }
    };

    const delBtn = document.createElement('button');
    delBtn.textContent = '刪除'; delBtn.className = 'cat-manage-btn del';
    delBtn.onclick = async () => {
      if (appData.templates.some(t => t.categoryId === cat.id) && !confirm('此分類含模板，將一併刪除，確定？')) return;
      appData.templates = appData.templates.filter(t => t.categoryId !== cat.id);
      appData.categories = appData.categories.filter(c => c.id !== cat.id);
      if (currentCategoryId === cat.id) currentCategoryId = appData.categories.length ? appData.categories[0].id : null;
      row.remove();
      renderUI();
      await saveAllTemplates('刪除分類');
    };

    row.appendChild(input);
    row.appendChild(upBtn);
    row.appendChild(downBtn);
    row.appendChild(saveBtn);
    row.appendChild(delBtn);
    list.appendChild(row);
  });
}

// ===== RENDER =====
function renderUI() {
  renderTabs();
  updateHeaderMeta();
  if (currentCategoryId && appData.categories.length > 0) {
    renderTemplateList();
  } else {
    document.getElementById('dynamicTemplateList').innerHTML = `
      <div class="empty-state">
        ${icons.emptyDoc}
        <p>請先新增分類以開始使用</p>
        <button class="btn-sm btn-primary" onclick="document.getElementById('addCategoryBtn').click()">新增分類</button>
      </div>`;
    document.getElementById('currentCategoryTitle').textContent = '無分類';
  }
  clearDetailPane();
}

function updateHeaderMeta() {
  const cnt = appData.templates.filter(t => t.categoryId === currentCategoryId).length;
  const total = appData.templates.length;
  document.getElementById('templateCount').textContent = `${cnt} / ${total} 筆`;
  document.getElementById('lastSync').textContent = lastSyncTime ? '同步於 ' + timeAgo(lastSyncTime) : '尚未同步';
}

function renderTabs() {
  const c = document.getElementById('dynamicTabs');
  c.innerHTML = '';
  appData.categories.forEach(cat => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (cat.id === currentCategoryId ? ' active' : '');
    tab.textContent = cat.name;
    tab.onclick = () => { currentCategoryId = cat.id; renderUI(); };
    c.appendChild(tab);
  });
  const cur = appData.categories.find(c => c.id === currentCategoryId);
  if (cur) document.getElementById('currentCategoryTitle').textContent = cur.name;
}

function renderTemplateList() {
  const el = document.getElementById('dynamicTemplateList');
  el.innerHTML = '';
  const sortMethod = document.getElementById('sortTemplate').value;
  let templates = appData.templates.filter(t => t.categoryId === currentCategoryId);

  if (!templates.length) {
    el.innerHTML = `
      <div class="empty-state">
        ${icons.emptyDoc}
        <p>此分類尚無模板</p>
        <button class="btn-sm btn-primary" onclick="document.getElementById('addTemplateBtn').click()">新增模板</button>
      </div>`;
    return;
  }

  let sorted = [...templates];
  sorted.sort((a, b) => {
    if (sortMethod === 'updatedDesc') return (b.updatedAt || 0) - (a.updatedAt || 0);
    if (sortMethod === 'createdDesc') return (b.createdAt || 0) - (a.createdAt || 0);
    if (sortMethod === 'titleAsc') return a.title.localeCompare(b.title);
    return 0;
  });

  sorted.forEach(tpl => {
    const card = document.createElement('div');
    card.className = 'tpl-card' + (tpl.id === selectedTemplateId ? ' selected' : '');
    card.innerHTML = `
      <div class="tpl-card-top">
        <span class="tpl-title">${tpl.title}</span>
        <div class="tpl-actions">
          <button class="copy-btn" title="複製">${icons.copy}</button>
          <button class="edit-btn" title="編輯">${icons.edit}</button>
          <button class="delete-btn" title="刪除">${icons.delete}</button>
        </div>
      </div>
      <div class="tpl-meta">
        <span>更新 ${timeAgo(tpl.updatedAt)}</span>
        <span>${wordCount(tpl.content)} 字</span>
      </div>
      <div class="tpl-peek">${truncate(tpl.content, 80)}</div>
    `;

    // Click card → show detail
    card.addEventListener('click', () => showDetail(tpl.id));

    card.querySelector('.copy-btn').addEventListener('click', e => { e.stopPropagation(); copyToClipboard(tpl.content, tpl.title); });
    card.querySelector('.edit-btn').addEventListener('click', e => { e.stopPropagation(); openSlideover('edit', tpl.id); });
    card.querySelector('.delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      showConfirmationDialog(() => {
        const idx = appData.templates.findIndex(t => t.id === tpl.id);
        if (idx !== -1) appData.templates.splice(idx, 1);
        if (selectedTemplateId === tpl.id) clearDetailPane();
        renderUI();
        saveAllTemplates('刪除模板: ' + tpl.title);
      });
    });

    el.appendChild(card);
  });
}

// ===== DETAIL PANE =====
function showDetail(tplId) {
  selectedTemplateId = tplId;
  const t = appData.templates.find(x => x.id === tplId);
  if (!t) return;

  // Mark selected in list
  document.querySelectorAll('.tpl-card').forEach(c => c.classList.remove('selected'));
  const cards = document.querySelectorAll('.tpl-card');
  const idx = [...appData.templates.filter(x => x.categoryId === currentCategoryId)].findIndex(x => x.id === tplId);

  // Desktop detail pane
  const isMobile = window.innerWidth < 1024;
  if (!isMobile) {
    document.getElementById('detailEmpty').style.display = 'none';
    const dc = document.getElementById('detailContent');
    dc.style.display = 'flex';
    document.getElementById('detailTitle').textContent = t.title;
    document.getElementById('detailMeta').innerHTML = `<span>更新 ${timeAgo(t.updatedAt)}</span><span>建立 ${timeAgo(t.createdAt)}</span><span>${wordCount(t.content)} 字</span>`;
    document.getElementById('detailBody').textContent = t.content;
    // Highlight card
    document.querySelectorAll('.tpl-card').forEach((c, i) => {
      const sorted = getSortedCurrentTemplates();
      if (sorted[i] && sorted[i].id === tplId) c.classList.add('selected');
    });
  } else {
    // Mobile: open overlay
    document.getElementById('mobileDetailTitle').textContent = t.title;
    document.getElementById('mobileDetailMeta').innerHTML = `<span>更新 ${timeAgo(t.updatedAt)}</span><span>${wordCount(t.content)} 字</span>`;
    document.getElementById('mobileDetailBody').textContent = t.content;
    document.getElementById('mobileDetail').classList.add('open');
    document.body.classList.add('no-scroll');
  }
}

function getSortedCurrentTemplates() {
  const sortMethod = document.getElementById('sortTemplate').value;
  let templates = appData.templates.filter(t => t.categoryId === currentCategoryId);
  let sorted = [...templates];
  sorted.sort((a, b) => {
    if (sortMethod === 'updatedDesc') return (b.updatedAt || 0) - (a.updatedAt || 0);
    if (sortMethod === 'createdDesc') return (b.createdAt || 0) - (a.createdAt || 0);
    if (sortMethod === 'titleAsc') return a.title.localeCompare(b.title);
    return 0;
  });
  return sorted;
}

function clearDetailPane() {
  selectedTemplateId = null;
  document.getElementById('detailEmpty').style.display = 'flex';
  document.getElementById('detailContent').style.display = 'none';
}

// ===== SLIDE-OVER =====
let slideoverMode = 'add';
let slideoverTplId = null;

function openSlideover(mode, tId = null) {
  slideoverMode = mode;
  slideoverTplId = tId;
  const bd = document.getElementById('slideoverBackdrop');
  const titleEl = document.getElementById('slideoverTitle');
  const titleInput = document.getElementById('templateTitle');
  const contentTa = document.getElementById('templateContent');
  const catSelect = document.getElementById('templateCategory');

  catSelect.innerHTML = appData.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  if (mode === 'add') {
    titleEl.textContent = '新增模板';
    titleInput.value = '';
    contentTa.value = '';
    catSelect.value = currentCategoryId;
  } else {
    const t = appData.templates.find(x => x.id === tId);
    titleEl.textContent = '編輯模板';
    titleInput.value = t.title;
    contentTa.value = t.content;
    catSelect.value = t.categoryId;
  }

  document.getElementById('saveTemplateBtn').onclick = async () => {
    const title = titleInput.value.trim();
    const content = contentTa.value.trim();
    const cid = catSelect.value;
    if (!title || !content) { showToast('請填寫完整', 'error'); return; }
    const now = Date.now();
    if (slideoverMode === 'add') {
      appData.templates.push({ id: 't_' + generateId(), title, content, categoryId: cid, createdAt: now, updatedAt: now });
    } else {
      const t = appData.templates.find(x => x.id === slideoverTplId);
      t.title = title; t.content = content; t.categoryId = cid; t.updatedAt = now;
    }
    closeSlideover();
    if (cid !== currentCategoryId) currentCategoryId = cid;
    renderUI();
    await saveAllTemplates((slideoverMode === 'add' ? '新增' : '更新') + '模板: ' + title);
  };

  bd.classList.add('open');
  document.body.classList.add('no-scroll');
  setTimeout(() => titleInput.focus(), 300);
}

function closeSlideover() {
  document.getElementById('slideoverBackdrop').classList.remove('open');
  document.body.classList.remove('no-scroll');
}

// ===== UTILITIES =====
function filterTemplates(term) {
  document.querySelectorAll('.tpl-card').forEach(c => {
    const text = c.querySelector('.tpl-title').textContent.toLowerCase();
    c.style.display = text.includes(term) ? '' : 'none';
  });
}

function copyToClipboard(text, title) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast(`「${title}」已複製`)).catch(() => fallbackCopy(text, title));
  } else {
    fallbackCopy(text, title);
  }
}
function fallbackCopy(text, title) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'absolute'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast(`「${title}」已複製`); }
  catch { showToast('複製失敗', 'error'); }
  document.body.removeChild(ta);
}

function showConfirmationDialog(cb) {
  const m = document.getElementById('confirmModal');
  m.style.display = 'flex';
  document.getElementById('confirmOkBtn').onclick = () => { cb(); hideConfirmationDialog(); };
}
function hideConfirmationDialog() { document.getElementById('confirmModal').style.display = 'none'; }

function closeAllModals() {
  document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
}

function loadSettings() {
  const s = localStorage.getItem('appConfig');
  if (s) config = { ...config, ...JSON.parse(s) };
}
function isConfigValid() { return config.githubToken && config.githubUsername && config.githubRepo; }
function switchTheme(e) {
  if (e.target.checked) { document.documentElement.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); }
  else { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme','light'); }
}

// ===== GITHUB =====
async function loadAllTemplates() {
  showToast('正在同步...');
  const res = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${dbFilePath}?ref=${config.githubBranch}`, {
    headers: { 'Authorization': `token ${config.githubToken}` }
  });
  if (res.status === 200) {
    const data = await res.json();
    appData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
    if (appData.categories && appData.categories.length > 0 && !appData.categories.find(c => c.id === currentCategoryId))
      currentCategoryId = appData.categories[0].id;
    lastSyncTime = Date.now();
    renderUI();
    showToast('讀取成功');
  } else if (res.status === 404) {
    showToast('偵測到舊版結構，自動遷移中...');
    await migrateOldTemplates();
  } else {
    throw new Error(`HTTP ${res.status}`);
  }
}

async function migrateOldTemplates() {
  appData.categories = [
    { id: 'cat_history', name: '病例模板' },
    { id: 'cat_personal', name: '會診模板' },
    { id: 'cat_department', name: '檢查模板' }
  ];
  appData.templates = [];
  currentCategoryId = 'cat_history';
  let mt = Date.now() - 1000000;
  async function fetchOld(p, cid) {
    try {
      const r = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/templates/${p}?ref=${config.githubBranch}`, { headers: { 'Authorization': `token ${config.githubToken}` }});
      if (r.status === 200) {
        const d = await r.json();
        JSON.parse(decodeURIComponent(escape(atob(d.content)))).forEach(t => {
          appData.templates.push({ id: 't_' + generateId(), title: t.title, content: t.content, categoryId: cid, createdAt: t.createdAt || (mt++), updatedAt: t.updatedAt || (mt++) });
        });
      }
    } catch(e){}
  }
  await fetchOld('history_templates.json', 'cat_history');
  await fetchOld('personal_templates.json', 'cat_personal');
  await fetchOld('department_templates.json', 'cat_department');
  await saveAllTemplates('自動遷移至 db.json');
  renderUI();
}

async function saveAllTemplates(message = 'Update') {
  if (!isConfigValid()) { showToast('無效 Token', 'error'); return; }
  try {
    const content = JSON.stringify(appData, null, 2);
    const b64 = btoa(unescape(encodeURIComponent(content)));
    let sha = null;
    try {
      const r = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${dbFilePath}?ref=${config.githubBranch}`, {
        headers: { 'Authorization': `token ${config.githubToken}` }, cache: 'no-store'
      });
      if (r.ok) sha = (await r.json()).sha;
    } catch(e) {}
    const body = { message, content: b64, branch: config.githubBranch };
    if (sha) body.sha = sha;
    const res = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${dbFilePath}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${config.githubToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) { lastSyncTime = Date.now(); updateHeaderMeta(); showToast('同步成功'); }
    else { const d = await res.json(); throw new Error(d.message || 'Failed'); }
  } catch(e) { showToast(`同步失敗: ${e.message}`, 'error'); }
}
