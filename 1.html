<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>病例書寫模板輔助系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <canvas id="bgCanvas"></canvas>
  <div class="container">
    <header class="glass-panel">
      <div class="logo">病例書寫模板</div>
      <div class="user-controls">
        <label class="theme-switch" for="checkbox">
          <input type="checkbox" id="checkbox" />
          <div class="slider round"></div>
        </label>
        <!-- Icons for theme switch can be added here if needed -->
      </div>
    </header>

    <div class="main-content">
      <div class="sidebar glass-panel">
        <div class="search-box">
          <input type="text" placeholder="Search templates..." id="searchTemplate">
        </div>

        <div class="tabs">
          <div class="tab active" data-tab="common">病例模板</div>
          <div class="tab" data-tab="personal">會診模板</div>
          <div class="tab" data-tab="department">檢查模板</div>
        </div>

        <div class="tab-content active" id="commonTab">
          <div class="template-section">
            <div class="template-header">
              <h3>病例模板</h3>
              <div class="template-btn-group">
                <button id="addHistoryBtn" class="template-add-btn">新增</button>
                <button id="syncHistoryBtn" class="template-sync-btn">同步</button>
              </div>
            </div>
            <div class="template-list" id="historyTemplateList">
              <!-- Common phrases items will be generated dynamically by JavaScript -->
            </div>
          </div>
        </div>

        <div class="tab-content" id="personalTab">
          <div class="template-section">
            <div class="template-header">
              <h3>會診模板</h3>
              <div class="template-btn-group">
                <button id="addPersonalBtn" class="template-add-btn">新增</button>
                <button id="syncPersonalBtn" class="template-sync-btn">同步</button>
              </div>
            </div>
            <div class="template-list" id="personalTemplateList">
              <!-- Personal template items will be generated dynamically by JavaScript -->
            </div>
          </div>
        </div>

        <div class="tab-content" id="departmentTab">
          <div class="template-section">
            <div class="template-header">
              <h3>檢查模板</h3>
              <div class="template-btn-group">
                <button id="addDepartmentBtn" class="template-add-btn">新增</button>
                <button id="syncDepartmentBtn" class="template-sync-btn">同步</button>
              </div>
            </div>
            <div class="template-list" id="departmentTemplateList">
              <!-- Department-specific template items will be generated dynamically by JavaScript -->
            </div>
          </div>
        </div>
        <!-- Status Message -->
        <div id="statusMessage" class="status-message"
          style="display: none; padding: 10px; margin-top: 10px; border-radius: 4px; text-align: center; font-size: 0.9rem;">
        </div>
      </div>
    </div>

    <footer>
      © 2025 病例書寫模板輔助系統 | Antigravity Edition
    </footer>
  </div>

  <!-- Add/Edit Template Item Modal -->
  <div id="templateModal" class="modal">
    <div class="modal-content glass-panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="modalTitle" style="margin: 0;">新增模板</h2>
        <span class="close">&times;</span>
      </div>

      <div class="form-group">
        <label for="templateTitle">模板標題</label>
        <input type="text" id="templateTitle" placeholder="Title">
      </div>
      <div class="form-group content-group">
        <label for="templateContent">模板文字內容</label>
        <textarea id="templateContent" placeholder="Content..."></textarea>
      </div>
      <button id="saveTemplateBtn" class="save-btn">儲存</button>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content glass-panel" style="max-width: 400px;">
      <h2 id="confirmTitle" style="margin-bottom: 1rem;">確認操作</h2>
      <p id="confirmMessage" style="color: var(--text-muted);">您確定要刪除此模板嗎？</p>
      <div class="modal-buttons">
        <button id="confirmCancelBtn" class="modal-btn">取消</button>
        <button id="confirmOkBtn" class="modal-btn confirm">確定</button>
      </div>
    </div>
  </div>



  <script>
    // Configuration State
    // Default GitHub settings (Restored)
    const defaultParts = ['ghp_', 'dU3V6G8uyko', 'J73JpXf9v8bdYkRRncl4aVYlU'];
    const defaultToken = defaultParts.join('');

    let config = {
      githubToken: defaultToken,
      githubUsername: "foured8601",
      githubRepo: "medical-records",
      githubBranch: 'main'
    };

    // Common phrases template
    let historyTemplates = [
      { title: "三高病史", content: "HTN, DM, hyperlipidemia" },
      { title: "心導管病史", content: "CAD s/p PCI" },
      { title: "慢性腎病", content: "CKD stage 3" },
      { title: "慢性肺病", content: "COPD" }
    ];

    // Personal templates
    let personalTemplates = [
      { title: "56歲男性", content: "56-year-old male" },
      { title: "生命徵象", content: "Vital signs: T 37.2°C, P 76/min, R 18/min, BP 132/78 mmHg" }
    ];

    // Department-specific templates
    let departmentTemplates = [
      { title: "急性心肌梗塞", content: "Acute myocardial infarction" },
      { title: "社區型肺炎", content: "Community-acquired pneumonia" }
    ];

    // Template file paths
    const templatesFilePath = "templates/history_templates.json";
    const personalTemplatesFilePath = "templates/personal_templates.json";
    const departmentTemplatesFilePath = "templates/department_templates.json";

    // On page load
    document.addEventListener('DOMContentLoaded', async () => {
      // 0. Load Config
      loadSettings();

      // 1. Dark Mode Init
      const toggleSwitch = document.querySelector('#checkbox');
      const currentTheme = localStorage.getItem('theme');
      if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggleSwitch.checked = true;
      } else {
        document.documentElement.removeAttribute('data-theme');
        toggleSwitch.checked = false;
      }
      toggleSwitch.addEventListener('change', switchTheme, false);

      // 2. Load Data (If config exists, try to load from GitHub, else render defaults)
      if (isConfigValid()) {
        try {
          await loadHistoryTemplates();
          await loadPersonalTemplates();
          await loadDepartmentTemplates();
        } catch (error) {
          console.error("Failed to load templates from GitHub:", error);
          showStatus("GitHub 連線失敗，載入預設模板", false);
          renderDefaults();
        }
      } else {
        renderDefaults();
      }

      // Set up search functionality
      document.getElementById('searchTemplate').addEventListener('input', function () {
        const searchTerm = this.value.toLowerCase();
        filterTemplates(searchTerm);
      });

      // Set up tab switching functionality
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          // Remove active class from all tabs
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          // Add active class to the current tab
          tab.classList.add('active');

          // Hide all tab content
          document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
          });
          // Show the current tab content
          const tabId = tab.getAttribute('data-tab') + 'Tab';
          document.getElementById(tabId).classList.add('active');
        });
      });

      // Initialize Settings Modal inputs
      document.getElementById('githubToken').value = config.githubToken;
      document.getElementById('githubUsername').value = config.githubUsername;
      document.getElementById('githubRepo').value = config.githubRepo;
      document.getElementById('githubBranch').value = config.githubBranch;
    });

    function renderDefaults() {
      renderHistoryTemplates();
      renderPersonalTemplates();
      renderDepartmentTemplates();
    }

    // --- Settings & Configuration ---

    function loadSettings() {
      const savedConfig = localStorage.getItem('appConfig');
      if (savedConfig) {
        const parsed = JSON.parse(savedConfig);
        // Merge saved config with current config (which holds defaults)
        config = { ...config, ...parsed };
      }
    }




    function isConfigValid() {
      return config.githubToken && config.githubUsername && config.githubRepo;
    }

    // Theme Switcher Function
    function switchTheme(e) {
      if (e.target.checked) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    // --- GitHub Integration ---

    // Load common phrases templates from GitHub
    async function loadHistoryTemplates() {
      if (!isConfigValid()) return;
      try {
        const response = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${templatesFilePath}?ref=${config.githubBranch}`, {
          headers: {
            'Authorization': `token ${config.githubToken}`
          }
        });

        if (response.status === 200) {
          const data = await response.json();
          const content = decodeURIComponent(escape(atob(data.content)));
          historyTemplates = JSON.parse(content);
          renderHistoryTemplates();
          showStatus("Common phrases templates loaded", true);
        } else if (response.status === 404) {
          // If the file does not exist, use default templates and save to GitHub
          await saveHistoryTemplatesToGitHub();
          renderHistoryTemplates();
        } else {
          throw new Error(`GitHub API response status code: ${response.status}`);
        }
      } catch (error) {
        console.error("Error loading common phrases templates:", error);
        throw error;
      }
    }

    // Load personal templates from GitHub
    async function loadPersonalTemplates() {
      if (!isConfigValid()) return;
      try {
        const response = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${personalTemplatesFilePath}?ref=${config.githubBranch}`, {
          headers: {
            'Authorization': `token ${config.githubToken}`
          }
        });

        if (response.status === 200) {
          const data = await response.json();
          const content = decodeURIComponent(escape(atob(data.content)));
          personalTemplates = JSON.parse(content);
          renderPersonalTemplates();
          showStatus("Personal templates loaded", true);
        } else if (response.status === 404) {
          await savePersonalTemplatesToGitHub();
          renderPersonalTemplates();
        } else {
          throw new Error(`GitHub API response status code: ${response.status}`);
        }
      } catch (error) {
        console.error("Error loading personal templates:", error);
        throw error;
      }
    }

    // Load department-specific templates from GitHub
    async function loadDepartmentTemplates() {
      if (!isConfigValid()) return;
      try {
        const response = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${departmentTemplatesFilePath}?ref=${config.githubBranch}`, {
          headers: {
            'Authorization': `token ${config.githubToken}`
          }
        });

        if (response.status === 200) {
          const data = await response.json();
          const content = decodeURIComponent(escape(atob(data.content)));
          departmentTemplates = JSON.parse(content);
          renderDepartmentTemplates();
          showStatus("Department templates loaded", true);
        } else if (response.status === 404) {
          await saveDepartmentTemplatesToGitHub();
          renderDepartmentTemplates();
        } else {
          throw new Error(`GitHub API response status code: ${response.status}`);
        }
      } catch (error) {
        console.error("Error loading department templates:", error);
        throw error;
      }
    }

    // Save common phrases templates to GitHub
    async function saveHistoryTemplatesToGitHub() {
      await saveTemplatesToGitHub(templatesFilePath, historyTemplates, "Update common phrases templates");
    }

    // Save personal templates to GitHub
    async function savePersonalTemplatesToGitHub() {
      await saveTemplatesToGitHub(personalTemplatesFilePath, personalTemplates, "Update personal templates");
    }

    // Save department-specific templates to GitHub
    async function saveDepartmentTemplatesToGitHub() {
      await saveTemplatesToGitHub(departmentTemplatesFilePath, departmentTemplates, "Update department-specific templates");
    }

    // Generic function to save templates to GitHub
    async function saveTemplatesToGitHub(filePath, templates, message) {
      if (!isConfigValid()) {
        showStatus("請先至設定頁面設定 GitHub Token", false);
        return;
      }
      try {
        const content = JSON.stringify(templates, null, 2);
        const base64Content = btoa(unescape(encodeURIComponent(content)));

        let fileSha = null;
        try {
          const checkResponse = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${filePath}?ref=${config.githubBranch}`, {
            headers: { 'Authorization': `token ${config.githubToken}` }
          });
          if (checkResponse.ok) {
            const fileData = await checkResponse.json();
            fileSha = fileData.sha;
          }
        } catch (e) {
          console.warn("Could not check for existing file, proceeding to create.", e);
        }

        const requestBody = {
          message: message,
          content: base64Content,
          branch: config.githubBranch
        };

        if (fileSha) {
          requestBody.sha = fileSha;
        }

        const response = await fetch(`https://api.github.com/repos/${config.githubUsername}/${config.githubRepo}/contents/${filePath}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${config.githubToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });

        if (response.ok) {
          showStatus("同步成功", true);
        } else {
          const data = await response.json();
          throw new Error(data.message || "Failed to save templates");
        }
      } catch (error) {
        console.error(`Error saving templates to ${filePath}:`, error);
        showStatus(`同步失敗: ${error.message}`, false);
        throw error;
      }
    }

    // Render common phrases template list
    function renderHistoryTemplates() {
      renderTemplateList('historyTemplateList', historyTemplates, 'history');
    }

    // Render personal template list
    function renderPersonalTemplates() {
      renderTemplateList('personalTemplateList', personalTemplates, 'personal');
    }

    // Render department-specific template list
    function renderDepartmentTemplates() {
      renderTemplateList('departmentTemplateList', departmentTemplates, 'department');
    }

    // SVG Icons (Material Design Style)
    const icons = {
      // Material Icon: content_copy
      copy: `<svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`,
      // Material Icon: visibility
      preview: `<svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`,
      // Material Icon: edit
      edit: `<svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M14.06 9.02l.92.92L5.92 19H5v-.92l9.06-9.06M17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 17.25V21h3.75L17.81 9.94l-3.75-3.75z"/></svg>`,
      // Material Icon: delete
      delete: `<svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/></svg>`
    };

    // Generic function to render a template list
    function renderTemplateList(elementId, templates, type) {
      const listElement = document.getElementById(elementId);
      listElement.innerHTML = '';

      templates.forEach((template, index) => {
        const item = document.createElement('div');
        item.className = 'template-item';

        item.innerHTML = `
              <span class="template-item-text">${template.title}</span>
              <div class="template-item-actions">
                <button class="copy-btn" title="複製">${icons.copy}</button>
                <button class="preview-btn" title="預覽">${icons.preview}</button>
                <button class="edit-btn" title="編輯">${icons.edit}</button>
                <button class="delete-btn" title="刪除">${icons.delete}</button>
              </div>
              <div class="template-preview-content">${template.content}</div>
            `;

        // Main click to copy
        item.querySelector('.template-item-text').addEventListener('click', () => {
          copyToClipboard(template.content, template.title);
        });

        // Action buttons
        item.querySelector('.copy-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          copyToClipboard(template.content, template.title);
        });

        item.querySelector('.preview-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          item.classList.toggle('preview-active');
        });

        item.querySelector('.edit-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          openTemplateModal('edit', index, type);
        });

        item.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          showConfirmationDialog(() => {
            templates.splice(index, 1);
            if (type === 'history') {
              renderHistoryTemplates();
              saveHistoryTemplatesToGitHub();
            } else if (type === 'personal') {
              renderPersonalTemplates();
              savePersonalTemplatesToGitHub();
            } else if (type === 'department') {
              renderDepartmentTemplates();
              saveDepartmentTemplatesToGitHub();
            }
          });
        });

        listElement.appendChild(item);
      });
    }

    // Filter template items
    function filterTemplates(searchTerm) {
      const items = document.querySelectorAll('.template-item');
      items.forEach(item => {
        const text = item.querySelector('.template-item-text').textContent.toLowerCase();
        item.style.display = text.includes(searchTerm) ? 'flex' : 'none';
      });
    }

    // Helper function to copy text to clipboard
    function copyToClipboard(text, templateTitle) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      // Make it invisible
      textarea.style.position = 'absolute';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        const successful = document.execCommand('copy');
        if (successful) {
          showStatus(`'${templateTitle}' 內容已複製！`, true);
        } else {
          showStatus('複製失敗', false);
        }
      } catch (err) {
        showStatus('複製失敗', false);
        console.error('無法複製', err);
      }
      document.body.removeChild(textarea);
    }

    // Open template editing modal
    function openTemplateModal(mode, index, type) {
      const modal = document.getElementById('templateModal');
      const modalTitle = document.getElementById('modalTitle');
      const templateTitleInput = document.getElementById('templateTitle');
      const templateContentTextarea = document.getElementById('templateContent');
      const saveTemplateBtn = document.getElementById('saveTemplateBtn');

      const typeMap = {
        history: { title: '病例模板', templates: historyTemplates },
        personal: { title: '會診模板', templates: personalTemplates },
        department: { title: '檢查模板', templates: departmentTemplates }
      };

      const currentType = typeMap[type];

      if (mode === 'add') {
        modalTitle.textContent = `新增${currentType.title}`;
        templateTitleInput.value = '';
        templateContentTextarea.value = '';
      } else if (mode === 'edit') {
        modalTitle.textContent = `編輯${currentType.title}`;
        const template = currentType.templates[index];
        templateTitleInput.value = template.title;
        templateContentTextarea.value = template.content;
      }

      saveTemplateBtn.onclick = async () => {
        const title = templateTitleInput.value.trim();
        const content = templateContentTextarea.value.trim();

        if (!title || !content) {
          alert('請輸入模板標題與文字內容');
          return;
        }

        const newTemplate = { title, content };

        if (mode === 'add') {
          currentType.templates.push(newTemplate);
        } else if (mode === 'edit') {
          currentType.templates[index] = newTemplate;
        }

        if (type === 'history') {
          renderHistoryTemplates();
          await saveHistoryTemplatesToGitHub();
        } else if (type === 'personal') {
          renderPersonalTemplates();
          await savePersonalTemplatesToGitHub();
        } else if (type === 'department') {
          renderDepartmentTemplates();
          await saveDepartmentTemplatesToGitHub();
        }

        modal.style.display = 'none';
      };

      // Display modal
      modal.style.display = 'flex';
    }

    // Add button click events
    document.getElementById('addHistoryBtn').addEventListener('click', () => {
      openTemplateModal('add', null, 'history');
    });

    document.getElementById('addPersonalBtn').addEventListener('click', () => {
      openTemplateModal('add', null, 'personal');
    });

    document.getElementById('addDepartmentBtn').addEventListener('click', () => {
      openTemplateModal('add', null, 'department');
    });

    // Sync button click events
    document.getElementById('syncHistoryBtn').addEventListener('click', async () => {
      showStatus('Syncing common templates...', true);
      await saveHistoryTemplatesToGitHub();
    });

    document.getElementById('syncPersonalBtn').addEventListener('click', async () => {
      showStatus('Syncing personal templates...', true);
      await savePersonalTemplatesToGitHub();
    });

    document.getElementById('syncDepartmentBtn').addEventListener('click', async () => {
      showStatus('Syncing department templates...', true);
      await saveDepartmentTemplatesToGitHub();
    });

    // Modal close button click event
    document.querySelectorAll('.close').forEach(closeBtn => {
      closeBtn.addEventListener('click', () => {
        closeBtn.closest('.modal').style.display = 'none';
      });
    });

    // Click outside modal to close
    window.addEventListener('click', (event) => {
      if (event.target.classList.contains('modal')) {
        event.target.style.display = 'none';
      }
    });

    // Confirmation Dialog Logic
    const confirmModal = document.getElementById('confirmModal');
    const confirmOkBtn = document.getElementById('confirmOkBtn');
    const confirmCancelBtn = document.getElementById('confirmCancelBtn');

    function showConfirmationDialog(callback) {
      confirmModal.style.display = 'flex';
      confirmOkBtn.onclick = () => {
        callback();
        hideConfirmationDialog();
      };
    }

    function hideConfirmationDialog() {
      confirmModal.style.display = 'none';
      confirmOkBtn.onclick = null;
    }

    confirmCancelBtn.onclick = hideConfirmationDialog;


    // Function to display status messages
    function showStatus(message, isSuccess) {
      const statusElement = document.getElementById('statusMessage');
      statusElement.textContent = message;
      statusElement.className = 'status-message ' + (isSuccess ? 'status-success' : 'status-error');

      // Update inline styles for status
      if (isSuccess) {
        statusElement.style.backgroundColor = "rgba(35, 134, 54, 0.2)";
        statusElement.style.color = "#3fb950";
        statusElement.style.border = "1px solid #238636";
      } else {
        statusElement.style.backgroundColor = "rgba(248, 81, 73, 0.2)";
        statusElement.style.color = "#f85149";
        statusElement.style.border = "1px solid #f85149";
      }

      statusElement.style.display = 'block';

      // Auto-hide after 3 seconds
      setTimeout(() => {
        statusElement.style.display = 'none';
      }, 3000);
    }
  </script>
  <script src="js/grid.js"></script>
</body>

</html>
